name: Build website

on:
  pull_request:
    paths:
      - "web/**"
      - "shared/liboxide/**"
      - "shared/libblight/**"
      - ".github/actions/web/**"
permissions:
  contents: read
jobs:
  web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true
      - name: Build web
        uses: ./.github/actions/web
      - name: Save web
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: web/dist
