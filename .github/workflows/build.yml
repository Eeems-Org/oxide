name: Build oxide

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build.yml"
      - "applications/**"
      - "shared/**"
      - "assets/**"
      - "interfaces/**"
      - "qmake/**"
      - "oxide.pro"
      - "Makefile"
      - "package"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "applications/**"
      - "shared/**"
      - "assets/**"
      - "interfaces/**"
      - "qmake/**"
      - "oxide.pro"
      - "Makefile"
      - "package"
permissions:
  contents: read
jobs:
  lint:
    name: Lint source
    runs-on: ubuntu-latest
    steps:
      - name: Cache shfmt
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/shfmt
          key: 43439b996942b53dfafa9b6ff084f394555d049c98fb7ec37978f7668b43e1be
      - name: Install shfmt
        shell: bash
        run: |
          install_dir=/usr/local/bin
          if ! [[ -f "$install_dir"/shfmt ]]; then
              shfmt_version=v3.2.1
              shfmt_checksum=43439b996942b53dfafa9b6ff084f394555d049c98fb7ec37978f7668b43e1be
              sudo curl --location --silent --fail --tlsv1.2 --proto '=https' \
                  --output "$install_dir"/shfmt \
                  https://github.com/mvdan/sh/releases/download/"$shfmt_version"/shfmt_"$shfmt_version"_linux_amd64
              sha256sum -c <(echo "$shfmt_checksum $install_dir/shfmt") > /dev/null 2>&1
              sudo chmod a+x "$install_dir"/shfmt
          fi
      - uses: actions/checkout@v6
      - name: Lint
        run: make lint
  build:
    name: Build and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install toltecmk
        run: pip install toltecmk
      - name: Build packages
        run: make package
        timeout-minutes: 15
      - name: Save packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: release
      - name: Save packages
        uses: actions/upload-artifact@v7
        with:
          name: build-rm1
          path: .build/package/build/rm1/src/release
      - name: Save packages
        uses: actions/upload-artifact@v7
        with:
          name: build-rm2
          path: .build/package/build/rm2/src/release
      - name: Save repo
        uses: actions/upload-artifact@v7
        with:
          name: repo-rm1
          path: .build/package/dist/rm1
      - name: Save repo
        uses: actions/upload-artifact@v7
        with:
          name: repo-rm2
          path: .build/package/dist/rm2
